<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weight Tracker</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:30px;
}

button{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.signup{
    background:#007BFF;
    color:white;
}

.login{
    background:#e0e0e0;
}

</style>
</head>

<body>

<div class="container">

<h1>Weight Tracker</h1>

<p>Track your daily weight easily</p>

<a href="/accounts/signup/">
<button class="signup">Create account</button>
</a>

<a href="/accounts/login/">
<button class="login">Log in</button>
</a>

</div>

</body>
</html>
