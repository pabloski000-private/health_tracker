<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.css">
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .topbar {
        position: sticky; top: 0;
        padding: 12px 16px;
        background: white;
        border-bottom: 1px solid #eee;
      }
      #calendar { padding: 10px; }

      /* Mobile modal */
      .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.35);
        display: none;
        align-items: flex-end;
      }
      .modal {
        width: 100%;
        background: white;
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
        padding: 16px;
        box-shadow: 0 -10px 30px rgba(0,0,0,.15);
      }
      .row { display: flex; gap: 10px; align-items: center; }
      input {
        width: 100%;
        font-size: 18px;
        padding: 12px 12px;
        border: 1px solid #ddd;
        border-radius: 12px;
      }
      button {
        font-size: 16px;
        padding: 12px 14px;
        border: 0;
        border-radius: 12px;
      }
      .btn-primary { background: black; color: white; width: 100%; }
      .btn-ghost { background: #f2f2f2; width: 100%; }
      .hint { color: #666; font-size: 13px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="topbar"><strong>Weight Calendar</strong></div>
    <div id="calendar"></div>

    <!-- Modal -->
    <div id="backdrop" class="modal-backdrop">
      <div class="modal">
        <div style="font-weight:600; font-size:16px;">Log weight</div>
        <div id="pickedDate" class="hint"></div>

        <div style="margin-top:12px;">
          <input id="weightInput" inputmode="decimal" placeholder="e.g. 82.4" />
          <div class="hint">kg (tap a date, enter weight, save)</div>
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="btn-ghost" id="cancelBtn">Cancel</button>
          <button class="btn-primary" id="saveBtn">Save</button>
        </div>
      </div>
    </div>

    <div style="padding: 10px;">
    <div style="font-weight:600; margin: 10px 0 6px;">Weight evolution</div>
    <div style="background:white; border:1px solid #eee; border-radius:16px; padding:10px;">
        <canvas id="weightChart" height="180"></canvas>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
    let weightChart = null;

    async function renderWeightChart() {
        const res = await fetch("/api/weights/series/");
        if (!res.ok) return;

        const { labels, data } = await res.json();
        const ctx = document.getElementById("weightChart");

        if (weightChart) weightChart.destroy();

        weightChart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
            label: "Weight (kg)",
            data,
            tension: 0.25,
            pointRadius: 3,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            scales: {
            x: { ticks: { maxRotation: 0, autoSkip: true } },
            y: { beginAtZero: false }
            }
        }
        });
    }

    document.addEventListener("DOMContentLoaded", renderWeightChart);

    // If you already save weights from the calendar modal,
    // call this after successful save:
    asyncio.run(renderWeightChart());
    </script>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>
    <script>
      // Django CSRF helper
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
      }

      let selectedISO = null;

      const backdrop = document.getElementById("backdrop");
      const pickedDate = document.getElementById("pickedDate");
      const weightInput = document.getElementById("weightInput");

      function openModal(isoDate) {
        selectedISO = isoDate;
        pickedDate.textContent = isoDate;
        weightInput.value = "";
        backdrop.style.display = "flex";
        setTimeout(() => weightInput.focus(), 50);
      }

      function closeModal() {
        backdrop.style.display = "none";
        selectedISO = null;
      }

      document.getElementById("cancelBtn").addEventListener("click", closeModal);
      backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeModal(); });

      document.addEventListener("DOMContentLoaded", function () {
        const el = document.getElementById("calendar");

        const cal = new FullCalendar.Calendar(el, {
          initialView: "dayGridMonth",
          height: "auto",
          firstDay: 1,
          headerToolbar: { left: "prev,next", center: "title", right: "dayGridMonth,timeGridWeek" },

          // Load saved weights
          events: "/api/weights/",

          // Tap a day (mobile-friendly)
          dateClick: function(info) {
            openModal(info.dateStr); // YYYY-MM-DD
          }
        });

        cal.render();

        document.getElementById("saveBtn").addEventListener("click", async () => {
          const raw = weightInput.value.trim().replace(",", ".");
          const w = Number(raw);

          if (!selectedISO) return;
          if (!Number.isFinite(w) || w <= 0) {
            alert("Enter a valid weight (e.g. 82.4)");
            return;
          }

          const res = await fetch("/api/weights/add/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCookie("csrftoken"),
            },
            body: JSON.stringify({ date: selectedISO, weight: raw })
          });

          if (!res.ok) {
            const txt = await res.text();
            alert("Save failed: " + txt);
            return;
          }

          closeModal();
          cal.refetchEvents();
          asyncio.run(renderWeightChart());
        });
      });
    </script>
  </body>
</html>
