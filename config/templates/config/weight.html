<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.css">
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .topbar {
        position: sticky; top: 0;
        padding: 12px 16px;
        background: white;
        border-bottom: 1px solid #eee;
      }
      #calendar { padding: 10px; }
      /* Make it feel more "app-like" on phones */
      .fc .fc-toolbar { flex-wrap: wrap; gap: 8px; }
      .fc .fc-toolbar-title { font-size: 18px; }
      .fc .fc-button { padding: 8px 10px; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <strong>Calendar</strong>
    </div>

    <div id="calendar"></div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const el = document.getElementById("calendar");
        const cal = new FullCalendar.Calendar(el, {
          initialView: "dayGridMonth",
          height: "auto",
          firstDay: 1,
          headerToolbar: {
            left: "prev,next",
            center: "title",
            right: "dayGridMonth,timeGridWeek,timeGridDay"
          },
          events: [
            { title: "Weigh-in", start: new Date().toISOString().slice(0,10) },
          ],
        });
        cal.render();
      });
    </script>
  </body>
</html>
